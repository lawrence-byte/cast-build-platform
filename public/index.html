<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CAST Build</title>
  <meta name="description" content="CAST Build project controls, schedule intelligence, document tools, and construction-cost forecasting.">
  <link rel="stylesheet" href="/cast-build.css">
  <link rel="stylesheet" href="/cast-build-components.css">
  <link rel="icon" href="/assets/brand/cast-monogram-logo.svg" type="image/svg+xml">
  <script src="/assets/brand/brand.js" defer></script>
  <script src="/cast-auth.js" defer></script>
</head>
<body>
  <main class="cast-access-section cast-access-section--platform" aria-label="CAST Build project access">
    <div class="cast-access-bg"></div>
    <div class="cast-access-overlay"></div>
    <img class="cast-landing-building-sketch" src="/assets/brand/alum-building-linen-sketch.png" alt="" width="898" height="1032" aria-hidden="true" decoding="async">

    <a class="cast-family-top" href="/" aria-label="CAST Community">
      <img src="/assets/brand/cast-community-logo-transparent.png" alt="CAST COMMUNITY">
    </a>

    <a class="automation-top" href="/procore.html" aria-label="CAST Automation">
      <img src="/assets/brand/cast-automation-horizontal-white-on-charcoal.png" alt="CAST AUTOMATION">
    </a>

    <section class="cast-access-content cast-access-content--platform" aria-label="CAST Build platform overview">
      <div class="cast-access-copy">
        <div class="cast-access-logo" aria-label="CASTBUILD">
          <img src="/assets/brand/cast-build-logo-transparent.png" alt="CAST BUILD">
        </div>
        <p class="cast-access-eyebrow">CONSTRUCTION MANAGEMENT OPERATING PLATFORM</p>
      </div>

      <div class="cast-access-grid cast-access-grid--platform">
        <a class="cast-access-card cast-access-card--primary cast-access-card--project" href="/projects/golden-hill-procore.html">
          <span>
            <h2>ALÜM PROJECT</h2>
          </span>
          <svg class="portal-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
