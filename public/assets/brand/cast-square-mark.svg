<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="title">
  <title id="title">CAST square mark</title>
  <!-- Hairline square frame. Inset 8px on each side. -->
  <rect x="14" y="14" width="172" height="172" fill="none" stroke="currentColor" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
  <!-- CAST wordmark, centered. -->
  <text x="100" y="118" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="44"
        font-weight="300"
        letter-spacing="6"
        fill="currentColor">CAST</text>
</svg>
