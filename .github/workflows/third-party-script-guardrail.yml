name: Third-Party Script Guardrail

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  third-party-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build deploy artifact
        run: npm run build

      - name: Check third-party script approvals
        run: npm run check:third-party-scripts

